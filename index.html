<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookStore Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{background:#f4f6f9}

/* HEADER */
header{
    background:linear-gradient(135deg,#1a2a6c,#b21f1f);
    color:white;
    text-align:center;
    padding:20px;
}

/* NAV */
nav{
    background:#2c3e50;
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

nav button{
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

/* GRID */
.container{padding:20px}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-body{padding:10px}

.price{color:#e74c3c;font-weight:bold}

button{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    cursor:pointer;
    border-radius:4px;
}

.standard{background:#3498db;color:white}
.premium{background:#9b59b6;color:white}
.pay{background:green;color:white}

/* PREMIUM SECTION */
#premiumBox{
    display:none;
    background:white;
    padding:20px;
    border-radius:8px;
    text-align:center;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#2c3e50;
    color:white;
}

/* MOBILE */
@media(max-width:600px){
    .card img{height:200px}
}
</style>
</head>

<body>

<header>
<h1>BookStore Pro</h1>
</header>

<nav>
<button onclick="showAll()">All</button>
<button onclick="filterBooks('romance')">Romance</button>
<button onclick="filterBooks('thriller')">Thriller</button>
<button onclick="filterBooks('dark')">Dark</button>
</nav>

<div class="container">

<div id="grid" class="grid"></div>

<div id="premiumBox">
<h2>Exclusive Premium Bundle</h2>
<img src="https://picsum.photos/seed/premium/400/300" style="max-width:250px">
<p class="price">$29.99</p>

<button class="pay" onclick="payNow()">Pay Now</button>
<button onclick="back()">Back</button>
</div>

</div>

<footer>© 2026 BookStore Pro</footer>

<script>

/* ===== BOOK DATA (6 books) ===== */
const books=[
{id:1,title:"Crimson Desire",genre:"dark",price:14.99,img:"https://picsum.photos/seed/1/400/600"},
{id:2,title:"Silent Witness",genre:"thriller",price:16.99,img:"https://picsum.photos/seed/2/400/600"},
{id:3,title:"Love in Paris",genre:"romance",price:12.99,img:"https://picsum.photos/seed/3/400/600"},
{id:4,title:"Dark Obsession",genre:"dark",price:15.49,img:"https://picsum.photos/seed/4/400/600"},
{id:5,title:"Final Verdict",genre:"thriller",price:17.29,img:"https://picsum.photos/seed/5/400/600"},
{id:6,title:"Forever Yours",genre:"romance",price:11.99,img:"https://picsum.photos/seed/6/400/600"}
];

/* ===== DISPLAY ===== */
function showAll(){
display(books);
}

function filterBooks(type){
const filtered=books.filter(b=>b.genre===type);
display(filtered);
}

function display(data){
document.getElementById("premiumBox").style.display="none";

const grid=document.getElementById("grid");
grid.innerHTML="";

data.forEach(b=>{
grid.innerHTML+=`
<div class="card">
<img src="${b.img}">
<div class="card-body">
<h3>${b.title}</h3>
<p>${b.genre}</p>
<p class="price">$${b.price}</p>

<button class="standard">View</button>
<button class="premium" onclick="openPremium()">Premium</button>
</div>
</div>
`;
});
}

/* ===== PREMIUM ===== */
function openPremium(){
document.getElementById("grid").innerHTML="";
document.getElementById("premiumBox").style.display="block";
}

/* ===== PAYMENT ===== */
function payNow(){
alert("Send money to 0727769411 to complete purchase.");
}

/* ===== BACK ===== */
function back(){
showAll();
}

/* INIT */
showAll();

</script>

</body>
</html>
